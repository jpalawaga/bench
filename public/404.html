<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Benchpress</title>
    <script>
      // GitHub Pages 404 redirect — sends all paths to index.html
      // The hash router handles routing from there
      var path = window.location.pathname + window.location.search;
      window.location.replace(window.location.origin + '/#' + path);
    </script>
  </head>
  <body></body>
</html>
